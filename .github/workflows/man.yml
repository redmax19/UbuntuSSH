name: Build ArtisanROM

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
          - test

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        target: [r8s]

    env:
      RELEASE_REPO: "ArtisanROM/rom_resources"
      GH_TOKEN: ${{ secrets.PAT }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
          submodules: recursive

    - name: Free disk space (1/3)
      run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

    - name: Free disk space (2/3)
      uses: jlumbroso/free-disk-space@main
      with:
          tool-cache: true

    - name: Free disk space (3/3)
      uses: rokibhasansagar/slimhub_actions@main
      with:
          retain: compiler_cmake

    - name: Set up build environment
      run: |
          sudo apt update
          DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            p7zip-full jq attr ccache clang ffmpeg golang \
            libbrotli-dev libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp \
            curl xxd patchelf flex bison libarchive-tools build-essential pcre2-utils libssl-dev
          sudo modprobe erofs f2fs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo -n "${{ secrets.PLATFORM_KEY_PK8 }}" | base64 --decode > security/extremerom_platform.pk8
          echo -n "${{ secrets.PLATFORM_KEY_PEM }}" | base64 --decode > security/extremerom_platform.x509.pem

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
          distribution: temurin
          java-version: 21
          cache: gradle
    
    - name: Install SSH Server and Rust
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl build-essential
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        
    - name: Install Bore CLI
      run: |
        source $HOME/.cargo/env
        cargo install bore-cli
        
    - name: Configure Passwordless SSH Server
      run: |
        sudo tee /etc/ssh/sshd_config > /dev/null <<EOF
        Port 22
        Protocol 2
        PasswordAuthentication yes
        PermitEmptyPasswords yes
        PubkeyAuthentication no
        ChallengeResponseAuthentication no
        PermitRootLogin yes
        StrictModes no
        UsePAM no
        X11Forwarding yes
        PrintMotd yes
        # Anti-Timeout: Mantém a conexão viva mesmo sem atividade
        TCPKeepAlive yes
        ClientAliveInterval 30
        ClientAliveCountMax 999
        Subsystem sftp /usr/lib/openssh/sftp-server
        EOF
        
    - name: Create Users with Empty Passwords
      run: |
        sudo passwd -d root
        sudo useradd -m -s /bin/bash topuser || true
        sudo passwd -d topuser
        sudo usermod -aG sudo topuser
        echo 'topuser ALL=(ALL) NOPASSWD: ALL' | sudo tee /etc/sudoers.d/topuser
        sudo chmod 440 /etc/sudoers.d/topuser
        
    - name: Start SSH Service
      run: |
        sudo ssh-keygen -A
        sudo systemctl start ssh
        
    - name: Start Bore Tunnel and Monitor (Auto-Recovery)
      run: |
        source $HOME/.cargo/env
        echo "🚀 Iniciando Bore com monitoramento ativo..."

        # Loop em background para manter o túnel vivo
        (
          while true; do
            echo "--- Tentando conectar ao bore.pub ---"
            # Se você quiser tentar uma porta específica, adicione '--port 55945' no final da linha abaixo
            $HOME/.cargo/bin/bore local 22 --to bore.pub > bore_output.txt 2>&1
            echo "⚠️ Bore desconectado. Reiniciando em 5 segundos..."
            sleep 5
          done
        ) &
        
        # Espera inicial para o túnel subir
        sleep 10
        
        # Loop principal para manter o Job vivo e mostrar as portas atualizadas
        echo "========================================"
        echo "🎯 SERVIDOR SSH INICIADO"
        echo "========================================"
        
        # Monitora o log e avisa se a porta mudar
        while true; do
          if [ -f bore_output.txt ]; then
            CURRENT_PORT=$(grep -oE 'bore\.pub:[0-9]+' bore_output.txt | cut -d: -f2 | tail -n 1)
            if [ ! -z "$CURRENT_PORT" ]; then
              echo "✅ STATUS: ONLINE | PORTA: $CURRENT_PORT | $(date)"
              echo "👉 COMANDO: ssh topuser@bore.pub -p $CURRENT_PORT"
            else
              echo "⏳ Aguardando conexão do Bore..."
            fi
          fi
          # O log a cada 60s evita que o GitHub encerre o job por inatividade
          sleep 60
        done
