name: SSH Estável com Senha (Sem Chaves)

on:
  workflow_dispatch:

jobs:
  ssh-senha:
    runs-on: ubuntu-latest

    steps:
    - name: Configurar Servidor SSH com Senha
      run: |
        # 1. Define a senha padrão '1234' para o usuário 'runner'
        echo "runner:1234" | sudo chpasswd
        
        # 2. Configura o SSH do Ubuntu para aceitar conexão por senha comum
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PubkeyAuthentication yes/PubkeyAuthentication no/' /etc/ssh/sshd_config
        sudo systemctl restart ssh

    - name: Instalar e Ativar Ngrok
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      run: |
        # 3. Instala o Ngrok oficial na máquina do GitHub
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y
        
        # 4. Conecta o Ngrok usando seu token e abre o túnel na porta 22 (SSH)
        ngrok config add-authtoken $NGROK_AUTH_TOKEN
        ngrok tcp 22 --log=stdout > /dev/null &
        
        sleep 5
        
        echo "=================================================================="
        echo "COPIE E COLE O COMANDO ABAIXO NO SEU TERMUX:"
        echo "=================================================================="
        curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\//ssh runner@/' | sed 's/:/ -p /2'
        echo "=================================================================="
        echo "QUANDO PEDIR A SENHA, DIGITE: 1234"
        echo "=================================================================="
        
        # Mantém vivo por 6 horas
        sleep 21600
