name: SSH Super Simples (Sem Chaves)

on:
  workflow_dispatch:

jobs:
  ssh-simples:
    runs-on: ubuntu-latest

    steps:
    - name: Configurar Senha e Iniciar Conexão
      run: |
        # 1. Define uma senha padrão super simples para a máquina: '1234'
        echo "runner:1234" | sudo chpasswd
        
        # 2. Permite que o SSH aceite conexões por senha comum
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
        # 3. Instala e roda o Pagekite para abrir o túnel
        curl -s https://pagekite.net/pk/ | sudo bash
        
        echo "=================================================================="
        echo "AGUARDE ATÉ 10 SEGUNDOS PARA VER O COMANDO ABAIXO"
        echo "=================================================================="
        
        # Inicia o túnel na porta 22 (SSH) e exibe o endereço na tela
        pagekite.py 22 ssh-ubuntu.pagekite.me --clean --logfile=/dev/null &
        
        sleep 8
        echo "=================================================================="
        echo "COPIE E COLE ESTE COMANDO NO SEU TERMUX:"
        echo "=================================================================="
        echo "ssh runner@ssh-ubuntu.pagekite.me"
        echo "=================================================================="
        echo "QUANDO PEDIR A SENHA, DIGITE: 1234"
        echo "=================================================================="
        
        # Mantém a máquina ligada por 6 horas
        sleep 21600
