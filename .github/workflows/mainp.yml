name: SSH

on:
  workflow_dispatch:

jobs:
  ssh-serveo:
    runs-on: ubuntu-latest

    steps:
    - name: Configurar SSH e Iniciar Serveo
      run: |
        # 1. Define a senha padrão '1234' para o usuário 'runner'
        echo "runner:1234" | sudo chpasswd
        
        # 2. Configura o SSH do Ubuntu para aceitar conexão por senha comum
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh

        echo "=================================================================="
        echo "AGUARDE 5 SEGUNDOS PARA GERAR O SEU COMANDO DO TERMUX..."
        echo "=================================================================="
        
        # 3. Abre o túnel usando um ALIAS EXCLUSIVO (mudei para redmax-actions)
        # Também adicionamos um loop para manter o túnel vivo se cair
        while true; do
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R redmax-actions:22:localhost:22 serveo.net
          sleep 5
        done &
        
        sleep 6
        
        echo "=================================================================="
        echo "COPIE E COLE O COMANDO ABAIXO NO SEU TERMUX:"
        echo "=================================================================="
        echo "ssh -J serveo.net runner@redmax-actions"
        echo "=================================================================="
        echo "QUANDO PEDIR A SENHA, DIGITE: 1234"
        echo "=================================================================="
        
        # Mantém vivo por 6 horas
        sleep 21600
